name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Format, lint, typecheck, unit, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Use the repository npm version
        shell: bash
        run: |
          npm_version="$(node --print "require('./package.json').packageManager.split('@').at(-1)")"
          npm install --global "npm@${npm_version}" --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci

      - name: Scan project files for high-confidence secrets
        run: npm run security:secrets

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production bundle
        env:
          NEXT_PUBLIC_APP_ENV: local
        run: npm run build

      - name: Upload non-secret build evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-evidence-${{ github.run_attempt }}
          path: |
            .next/build-manifest.json
            .next/routes-manifest.json
          if-no-files-found: ignore
          retention-days: 7

  smoke:
    name: Playwright localhost smoke test
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_APP_ENV: local
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Use the repository npm version
        shell: bash
        run: |
          npm_version="$(node --print "require('./package.json').packageManager.split('@').at(-1)")"
          npm install --global "npm@${npm_version}" --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: node scripts/run-playwright.mjs install --with-deps chromium

      - name: Run smoke tests against localhost
        run: npm run test:e2e:smoke

      - name: Upload Playwright evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-evidence-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  local-database:
    name: Local Supabase migration validation
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Use the repository npm version
        shell: bash
        run: |
          npm_version="$(node --print "require('./package.json').packageManager.split('@').at(-1)")"
          npm install --global "npm@${npm_version}" --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci

      # Every command below targets only the ephemeral local Docker stack;
      # no hosted project is linked or mutated.
      - name: Start local Supabase
        shell: bash
        run: |
          if npm run supabase:start >/dev/null 2>&1; then
            echo "Local Supabase started; credential-bearing command output was suppressed."
          else
            echo "::error::Local Supabase failed to start; raw output was suppressed."
            exit 1
          fi

      - name: Replay migrations, load seed data, and run local database tests
        run: npm run supabase:verify

      - name: Stop local Supabase
        if: ${{ always() }}
        shell: bash
        run: |
          if npm run supabase:stop >/dev/null 2>&1; then
            echo "Local Supabase stopped; credential-bearing command output was suppressed."
          else
            echo "::warning::Local Supabase cleanup did not complete; raw output was suppressed."
          fi
